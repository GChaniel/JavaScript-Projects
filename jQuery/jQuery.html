<!doctype html>
<html lang="en">
  <head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>
  <body>
    <script>
      $(document).ready(function () {
        $("body").append(`
          <div id="container">
                <div id="inner">
                    <h1>Basic jQuery</h1>
                    <p id='1'>Paragraph 1</p>
                    <p id='2'>Paragraph 2</p>
                    <p id='3'>Paragraph 3</p>
                </div>
            </div>
        `);

        //Changing the colour of paragraph 2 to red
        $("#2").css({ color: "red" });

        //Hiding the heading slowly when paragraph 3 is clicked
        $("#3").click(function () {
          $("h1").hide("slow");
        });
      });
    </script>
  </body>
</html>
