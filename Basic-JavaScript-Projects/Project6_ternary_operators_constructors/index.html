<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ternary Operators</title>
    <script src="JS/main.js"></script>
  </head>
  <body>
    <!-- Ternary operation-->
    <p>Riders must be at least 52 centimeters tall to ride.</p>
    <input id="Height" value="" />
    <button onclick="Ride_Function()">Click here</button>
    <p id="Ride"></p>

    <!-- Ternary operation for voting-->
    <p>You must be 18 or older to vote</p>
    <input id="Age" value="" />
    <button onclick="Vote_Function()">Click here</button>
    <p id="Vote"></p>

    <!-- JS constructor function-->
    <p>JS Constructor</p>
    <button onclick="myFunction()">Click here!</button>
    <p id="New_and_This"></p>

    <!-- This is a nested Funtion-->
    <p>Nested Function</p>
    <p id="Nested_Function" onclick="count_Function()">Click here</p>
  </body>
</html>
